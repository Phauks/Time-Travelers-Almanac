name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Weekly rebuild so posters and aggregator scores stay fresh (Mondays 06:00 UTC)
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

# Let a deployment finish rather than cancelling it mid-publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Content gate (no em dashes, etc.)
        run: node scripts/content-lint.mjs

      # Reads the site's base path from Pages settings, and tries to turn on
      # Pages (source = GitHub Actions) so no manual toggle is needed.
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Enrich data (posters and scores; no-op without keys)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: node scripts/enrich.mjs

      - name: Build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
